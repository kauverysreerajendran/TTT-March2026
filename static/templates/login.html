{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Style -->
    <style>
      .brand-logo {
        perspective: 1000px; /* needed for 3D flip */
      }

      /* gentle flip-flop (left-right) */
      .brand-logo img {
        display: block;
        margin: 0 auto;
        max-width: 180px;
        max-height: 120px;
        transform-origin: center center;
        transform-style: preserve-3d;
        will-change: transform;
        backface-visibility: hidden;
        animation: flipflop 3s ease-in-out infinite;
      }

      /* flip-flop keyframes */
      @keyframes flipflop {
        0% {
          transform: rotateY(-25deg);
        }
        50% {
          transform: rotateY(90deg);
        }
        100% {
          transform: rotateY(-25deg);
        }
      }

      /* Respect reduced-motion preference */
      @media (prefers-reduced-motion: reduce) {
        .brand-logo img {
          animation: none;
          transform: none;
        }
      }

      body {
        background-image: url("{% static 'assets/images/login.jpg' %}");
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: scroll;
        /* Fill viewport while preserving aspect ratio (may crop edges) */
        background-size: cover !important;
        position: relative;
      }
      /* Right-side static illustration */
      .right-vec-container {
        position: absolute;
        right: 6vw;
        top: 50%;
        transform: translateY(-50%);
        width: 44vw;
        max-width: 780px;
        z-index: 3;
        pointer-events: none;
        display: block;
      }
      .right-vec-container img {
        width: 100%;
        height: auto;
        object-fit: contain;
        display: block;
        filter: none;
      }
      @media (max-width: 991px) {
        .right-vec-container {
          display: none !important;
        }
      }
      .bg-blur-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        backdrop-filter: blur(1px);
        -webkit-backdrop-filter: blur(14px);
        z-index: 0;
      }
      .container-scroller,
      .page-body-wrapper,
      .content-wrapper {
        background: transparent !important;
        position: relative;
        z-index: 2;
      }
      /* New centered card layout (override earlier positioning) */
      .page-card {
        width: min(1100px, 92%);
        margin: 6vh auto;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 24px 60px rgba(18, 52, 67, 0.12);
        overflow: hidden;
        display: flex;
        min-height: 520px;
      }
      .page-card .card-left {
        width: 56%;
        padding: 56px 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
      }
      .page-card .card-right {
        width: 44%;
        position: relative;
        background: linear-gradient(
          90deg,
          rgba(13, 148, 136, 0.06) 0%,
          rgba(13, 148, 136, 0.14) 50%,
          rgba(10, 107, 102, 0.18) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card-right::before {
        content: "";
        position: absolute;
        left: -20%;
        width: 140%;
        height: 140%;
        background: radial-gradient(
          circle at 80% 20%,
          rgba(13, 148, 136, 0.18),
          rgba(13, 148, 136, 0.06) 40%,
          transparent 60%
        );
        border-radius: 50%;
        transform: translateY(-10%);
        z-index: 0;
      }
      .card-right img {
        position: relative;
        z-index: 1;
        width: 100%;
        height: auto;
        object-fit: contain;
        pointer-events: none;
      }
      /* Make the auth card look like the mock inside the left column */
      .auth-form-light.text-left.py-5.px-4.px-sm-5 {
        background: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
      }
      /* Responsive: stack vertically on small screens */
      @media (max-width: 900px) {
        .page-card {
          flex-direction: column;
          min-height: auto;
        }
        .page-card .card-left,
        .page-card .card-right {
          width: 100%;
          padding: 28px;
        }
        .card-right::before {
          display: none;
        }
      }
      /* Image carousel styles */
      .image-carousel {
        position: absolute;
        right: 0;
        left: auto;
        top: 0;
        width: 50vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        overflow: hidden;
      }
      .carousel-slide {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .carousel-slide.active {
        opacity: 1;
      }
      .carousel-slide img {
        max-width: 80%;
        max-height: 80%;
        object-fit: contain;
        display: block;
        pointer-events: none;
        user-select: none;
      }
      .form-control,
      .form-control-lg {
        border-radius: 15px !important;
        background: #fff !important;
        color: #222 !important;
        transition: none !important;
      }
      .form-control:focus,
      .form-control-lg:focus {
        background: #fff !important;
        color: #222 !important;
        box-shadow: 0 0 0 2px #e0e0e0 !important;
      }

      /* Input icon styles */
      .input-with-icon {
        position: relative;
      }
      .input-with-icon .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        display: inline-block;
        pointer-events: none;
        fill: #0d9488; /* teal */
        color: #0d9488;
      }
      .input-with-icon .form-control {
        padding-left: 44px !important;
      }
      .auth-form-btn {
        width: 48% !important;
        display: inline-block;
        margin-left: 0;
        margin-right: 0;
        padding: 14px 22px !important;
        line-height: 1;
        font-size: 16px !important;
        border-radius: 12px !important;
        text-transform: none; /* keep original casing */
        letter-spacing: normal;
        font-weight: 400; /* normal weight */
      }
      .mt-3 {
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 0;
      }
      .btn-primary:hover,
      .btn-primary:active {
        background-color: rgb(26, 109, 100) !important;
        border-color: rgb(35, 88, 82) !important;
        color: #fff !important;
      }
      /* Specific styling for the large auth button (match provided shade) */
      .btn-primary.auth-form-btn {
        border-radius: 12px !important;
        background: linear-gradient(
          180deg,
          #28c3bd 0%,
          #0f7f7a 45%,
          #0a6b66 100%
        ) !important;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0)),
          linear-gradient(180deg, #28c3bd 0%, #0f7f7a 45%, #0a6b66 100%) !important;
        color: #ffffff !important;
        box-shadow: 0 6px 18px rgba(10, 95, 90, 0.22);
      }
      .btn-primary.auth-form-btn:hover,
      .btn-primary.auth-form-btn:active {
        background: linear-gradient(
          180deg,
          #0c7d77 0%,
          #06524f 100%
        ) !important;
        border-color: rgba(0, 0, 0, 0.08) !important;
        box-shadow: 0 10px 28px rgba(6, 70, 63, 0.28) !important;
        transform: translateY(-1px);
      }
      .cancelBtn {
        background: #b63c3c !important;
        color: #fff !important;
        border: 2px solid #b63c3c !important;
        border-radius: 30px !important;
        font-size: 18px !important;
        font-weight: 500 !important;
        padding: 10px 0 !important;
        width: 48% !important;
        margin-top: 0;
        margin-left: 4%;
        box-shadow: 0 2px 12px rgba(255, 59, 59, 0.07);
        transition:
          background 0.2s,
          color 0.2s;
        display: inline-block;
      }
      .cancelBtn:hover,
      .cancelBtn:active {
        background: #f00e0e !important;
        color: #ffffff !important;
        border-color: #ff3b3b !important;
      }
      h4 {
        color: #fff !important;
        font-weight: 400 !important;
        font-size: 25px !important;
      }
      h6 {
        color: #fff !important;
        font-weight: 300 !important;
      }
      .brand-logo {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 18px;
        margin-top: -30px;
      }
      .brand-logo img {
        display: block;
        margin: 0 auto;
        max-width: 180px;
        max-height: 120px;
      }
      .auth-form-light.text-left.py-5.px-4.px-sm-5 {
        background: rgba(255, 255, 255, 0.19) !important;
        border-radius: 30px !important;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.24);
      }
      .login-subtitle {
        color: #383939; /* teal */
        font-weight: 400; /* normal */
        font-family: inherit;
        margin-top: 6px;
        margin-bottom: 6px;
        text-align: center;
        font-size: 1.15rem;
      }
      @media (max-width: 991px) {
        .col-lg-4 {
          margin-right: 0 !important;
          width: 100% !important;
          max-width: 100% !important;
        }
        .content-wrapper.d-flex.align-items-center.justify-content-end.auth.px-0 {
          justify-content: center !important;
          padding: 0 8px !important;
        }
        .row.w-100.mx-0 {
          margin: 0 !important;
          width: 100% !important;
          justify-content: center !important;
        }
        .brand-logo {
          margin-top: -60px !important;
          margin-bottom: 10px !important;
        }
        .mt-3 {
          display: flex;
          justify-content: center;
        }
        .auth-form-btn {
          width: auto !important;
          min-width: 120px;
        }
        .image-carousel {
          display: none !important;
        }
      }
      @media (max-width: 600px) {
        .auth-form-light.text-left.py-5.px-4.px-sm-5 {
          padding: 18px 6px !important;
          border-radius: 50px !important;
        }
        .brand-logo img {
          max-width: 120px !important;
          max-height: 80px !important;
        }
        h4,
        h6 {
          text-align: center !important;
        }
        .image-carousel {
          display: none !important;
        }
      }
      /* Mobile-first responsive refinements */
      :root {
        font-size: clamp(14px, 2.6vw, 16px);
      }
      img {
        max-width: 100%;
        height: auto;
      }
      .container-scroller,
      .page-body-wrapper,
      .content-wrapper,
      .row.w-100.mx-0,
      .col-lg-4 {
        width: 100%;
        max-width: 100%;
      }
      input,
      button,
      .btn,
      .form-control,
      .form-control-lg,
      .auth-form-btn,
      .cancelBtn {
        min-height: 44px;
      }
      .mt-3 {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .auth-form-btn,
      .cancelBtn {
        width: 100% !important;
        margin: 0 !important;
      }
      @media (max-width: 480px) {
        .content-wrapper.d-flex.align-items-center.justify-content-end.auth.px-0 {
          justify-content: center !important;
          padding: 0.75rem !important;
        }
        .col-lg-4 {
          margin-right: 0 !important;
        }
        .auth-form-light.text-left.py-5.px-4.px-sm-5 {
          border-radius: 1.15rem !important;
          padding: 1rem !important;
        }
      }
      @media (min-width: 481px) and (max-width: 768px) {
        :root {
          font-size: clamp(14px, 2vw, 16px);
        }
        .col-lg-4 {
          max-width: 85% !important;
          margin-right: 0 !important;
        }
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        :root {
          font-size: clamp(15px, 1.5vw, 17px);
        }
        .col-lg-4 {
          max-width: 58% !important;
          margin-right: 4vw !important;
        }
      }
      @media (min-width: 1025px) {
        .mt-3 {
          flex-direction: row;
          align-items: center;
        }
      }
    </style>

    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Titan</title>
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/feather/feather.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/ti-icons/css/themify-icons.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/css/vertical-layout-light/style.css' %}"
    />
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" />
  </head>

  <body>
    <div class="bg-blur-overlay"></div>

    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div
          class="content-wrapper d-flex align-items-center justify-content-start auth px-0"
          style="min-height: 100vh"
        >
          <div class="page-card" role="main">
            <div class="card-left">
              <div class="auth-form-light text-left py-5 px-4 px-sm-5">
                <div class="brand-logo">
                  <img
                    src="{% static 'assets/logo/titan_logo.png' %}"
                    alt="logo"
                  />
                </div>
                <p class="login-subtitle">Login to Track & Trace</p>
                {% if error %}
                <div class="alert alert-danger" style="margin-bottom: 16px">
                  {{ error }}
                </div>
                {% endif %}
                <form class="pt-3" method="post" action="{% url 'login-api' %}">
                  {% csrf_token %}
                  <div class="form-group input-with-icon">
                    <span class="input-icon" aria-hidden="true">
                      <svg
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                        focusable="false"
                        aria-hidden="true"
                      >
                        <path
                          d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5zm0 2c-3.866 0-7 1.79-7 4v1h14v-1c0-2.21-3.134-4-7-4z"
                        />
                      </svg>
                    </span>
                    <input
                      type="text"
                      name="username"
                      id="usernameInput"
                      class="form-control form-control-lg"
                      placeholder="Email or phone number"
                    />
                  </div>
                  <div
                    class="form-group input-with-icon"
                    style="position: relative"
                  >
                    <span class="input-icon" aria-hidden="true">
                      <svg
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                        focusable="false"
                        aria-hidden="true"
                      >
                        <path
                          d="M17 8V7a5 5 0 00-10 0v1H5a2 2 0 00-2 2v8a2 2 0 002 2h14a2 2 0 002-2v-8a2 2 0 00-2-2h-2zm-7-1a3 3 0 016 0v1H10V7zm2 9a2 2 0 11.001-4.001A2 2 0 0112 16z"
                        />
                      </svg>
                    </span>
                    <input
                      type="password"
                      name="password"
                      id="passwordInput"
                      class="form-control form-control-lg"
                      placeholder="Password"
                    />
                    <span
                      id="togglePassword"
                      style="
                        position: absolute;
                        top: 50%;
                        right: 14px;
                        transform: translateY(-50%);
                        cursor: pointer;
                      "
                    ></span>
                  </div>
                  <div
                    class="mt-3"
                    style="display: flex; gap: 12px; align-items: center"
                  >
                    <button type="submit" class="btn btn-primary auth-form-btn">
                      Login
                    </button>
                  </div>
                </form>
              </div>
            </div>
            <div class="card-right" aria-hidden="true">
              <img
                src="{% static 'assets/images/loginVec.png' %}"
                alt="illustration"
              />
            </div>
          </div>
        </div>
        <!-- content-wrapper ends -->
      </div>
      <!-- page-body-wrapper ends -->
    </div>
    <!-- container-scroller -->
    <script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <script src="{% static 'assets/js/off-canvas.js' %}"></script>
    <script src="{% static 'assets/js/hoverable-collapse.js' %}"></script>
    <script src="{% static 'assets/js/template.js' %}"></script>
    <script src="{% static 'assets/js/settings.js' %}"></script>
    <script src="{% static 'assets/js/todolist.js' %}"></script>
    <!-- Gallery grid and tilt effect JS -->
    <script>
      // Auto-sliding carousel
      let currentSlide = 0;
      const slides = document.querySelectorAll(".carousel-slide");
      const totalSlides = slides.length;

      function showSlide(n) {
        // Remove active class from all slides
        slides.forEach((slide) => slide.classList.remove("active"));
        // Add active class to current slide
        slides[n].classList.add("active");
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % totalSlides;
        showSlide(currentSlide);
      }

      // Auto-slide every 4 seconds
      setInterval(nextSlide, 4000);

      // Password show/hide toggle
      document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("passwordInput");
        const togglePassword = document.getElementById("togglePassword");
        const eyeOpen = document.getElementById("eyeOpen");
        const eyeClosed = document.getElementById("eyeClosed");
        const usernameInput = document.getElementById("usernameInput");
        const cancelBtn = document.getElementById("cancelBtn");
        let visible = false;

        togglePassword.addEventListener("click", function () {
          visible = !visible;
          if (visible) {
            passwordInput.type = "text";
            eyeOpen.style.display = "none";
            eyeClosed.style.display = "inline";
          } else {
            passwordInput.type = "password";
            eyeOpen.style.display = "inline";
            eyeClosed.style.display = "none";
          }
        });

        // Cancel button clears inputs and resets password field
        cancelBtn.addEventListener("click", function () {
          usernameInput.value = "";
          passwordInput.value = "";
          passwordInput.type = "password";
          visible = false;
          eyeOpen.style.display = "inline";
          eyeClosed.style.display = "none";
        });
      });

      // ...existing code...
      document.addEventListener("DOMContentLoaded", function () {
        const passwordInput = document.getElementById("passwordInput");
        const usernameInput = document.getElementById("usernameInput");
        const cancelBtn = document.getElementById("cancelBtn");
        // ...existing code...
        cancelBtn.addEventListener("click", function () {
          usernameInput.value = "";
          passwordInput.value = "";
          passwordInput.type = "password";
        });
      });
      // ...existing code...
    </script>
  </body>
</html>
